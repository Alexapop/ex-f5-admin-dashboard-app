<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body data-page="login">
    <main class="layout-session login-page">
        <section class="login-image-panel">
            <article class="desktop-info-card">
                <h2>Administrative Precision</h2>
                <p>The standard for high-stakes organizational management and architectural operational clarity.</p>
            </article>
        </section>
        <section class="admin-panel">
            <img src="../../docs/assets/logo/logo-login-page.png"
                alt="F5 Admin Dashboard login page logo with stylized blue shield emblem and text F5 Admin on white background conveying a professional tone">
            <h1>Admin Access</h1>
            <h2>Centralized administrative management</h2>
        </section>
        <section class="login-session">
            <label for="email-login"> Email Address</label>
            <img src="../../docs/assets/icon/icon-email.png"
                alt="Email icon representing the email address input field for login authentication">
            <input type="email" id="email-login" name="email-login">
            <label for="password-login">Password</label>
            <img src="../../docs/assets/icon/icon-password.png"
                alt="Password icon representing the password input fiel for login authentification">
            <input type="password" id="password-login" name="password-login">
            <button class="login-btn">Login</button>
        </section>
    </main>
     <script type="module" src="../../main.js"></script>
</body>

</html>
